<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>그래프 계산기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">오 이거 뭐지</p>
        <h1>그래프 계산기</h1>
      </div>

      <div class="formula-card">
        <span>현재 함수</span>
        <strong id="formulaText">y = x²</strong>
        <p id="zoomText">확대: 1배</p>
      </div>
    </section>

    <section class="workspace">
      <form id="functionForm" class="control-panel">
        <h2>계수 입력</h2>
        <p class="hint">y = ax⁴ + bx³ + cx² + dx + e </p>

        <div class="coefficient-list">
          <label>
            <span>a (x⁴)</span>
            <input id="aInput" type="number" value="0" step="0.1">
          </label>

          <label>
            <span>b (x³)</span>
            <input id="bInput" type="number" value="0" step="0.1">
          </label>

          <label>
            <span>c (x²)</span>
            <input id="cInput" type="number" value="1" step="0.1">
          </label>

          <label>
            <span>d (x)</span>
            <input id="dInput" type="number" value="0" step="0.1">
          </label>

          <label>
            <span>e (상수)</span>
            <input id="eInput" type="number" value="0" step="0.1">
          </label>
        </div>

        <div class="button-row">
          <button type="submit">그래프 그리기</button>
          <button id="resetButton" type="button">초기화</button>
        </div>


      </form>

      <section class="graph-panel" aria-label="함수 그래프">
        <canvas id="graphCanvas" width="760" height="520"></canvas>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
